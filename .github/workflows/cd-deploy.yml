name: Continuous Deployment

on:
  workflow_run:
    workflows: ["Continuous Delivery"]
    types: [completed]
  workflow_dispatch:
    inputs:
      image_tag:
        description: Docker image tag to deploy
        required: false
        default: latest

permissions:
  contents: read
  packages: read

env:
  REGISTRY: ghcr.io
  IMAGE_TAG: ${{ github.event.inputs.image_tag || 'latest' }}

jobs:
  deploy:
    name: Stage 9 - Deploy to EC2
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts
      - name: Resolve image names
        run: |
          echo "BACKEND_IMAGE=ghcr.io/gosha004/se320app-backend:latest" >> "$GITHUB_ENV"
          echo "FRONTEND_IMAGE=ghcr.io/gosha004/se320app-frontend:latest" >> "$GITHUB_ENV"
      - name: Upload Docker Compose file
        run: |
          scp -i ~/.ssh/ec2_key SE320App/docker-compose.yaml "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/${{ secrets.EC2_USER }}/docker-compose.yaml"
      - name: Deploy application
        run: |
          ssh -i ~/.ssh/ec2_key "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" "\
            docker login ghcr.io -u '${{ github.actor }}' -p '${{ secrets.GITHUB_TOKEN }}' && \
            export BACKEND_IMAGE='${BACKEND_IMAGE}' && \
            export FRONTEND_IMAGE='${FRONTEND_IMAGE}' && \
            export JWT_SECRET='${{ secrets.JWT_SECRET }}' && \
            export OPENAI_API_KEY='${{ secrets.OPENAI_API_KEY }}' && \
            sudo docker compose -f /home/${{ secrets.EC2_USER }}/docker-compose.yaml pull && \
            sudo docker compose -f /home/${{ secrets.EC2_USER }}/docker-compose.yaml up -d"
      - name: Post-deployment verification
        run: |
          curl -fsS "http://${{ secrets.EC2_HOST }}:8080/v3/api-docs"
          curl -fsS "http://${{ secrets.EC2_HOST }}:3000/"
