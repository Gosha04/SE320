name: Continuous Integration

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  security-events: write

defaults:
  run:
    working-directory: SE320App

jobs:
  build:
    name: Stage 1 - Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "22"
          cache: maven
      - name: Compile and package backend
        run: mvn -B -DskipTests package
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: SE320App/frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: SE320App/frontend
        run: npm ci
      - name: Build frontend
        working-directory: SE320App/frontend
        run: npm run build

  unit-tests:
    name: Stage 2 - Unit Tests and Coverage
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "22"
          cache: maven
      - name: Run unit tests with JaCoCo 80 percent gate
        run: mvn -B verify
      - name: Upload JaCoCo report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: SE320App/target/site/jacoco

  integration-tests:
    name: Stage 3 - Integration Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "22"
          cache: maven
      - name: Run Spring Boot integration tests
        run: mvn -B -Dtest="*IntegrationTest,*ApiTest" test

  code-quality:
    name: Stage 4 - Code Quality
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "22"
          cache: maven
      - name: Checkstyle
        run: mvn -B checkstyle:check
      - name: SpotBugs
        run: mvn -B -DskipTests compile spotbugs:check
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: SE320App/frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: SE320App/frontend
        run: npm ci
      - name: ESLint
        working-directory: SE320App/frontend
        run: npm run lint

  dependency-check:
    name: Stage 5 - Dependency Check
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "22"
          cache: maven
      - name: OWASP Dependency-Check
        run: mvn -B dependency-check:check
      - name: Upload dependency-check report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-report
          path: SE320App/target/dependency-check-report.*

  security-scan:
    name: Stage 6 - Security Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
