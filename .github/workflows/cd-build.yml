name: Continuous Delivery

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  docker-build-push-smoke:
    name: Stages 7-8 - Package and Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Resolve image names
        run: |
          echo "BACKEND_IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}-backend" >> "$GITHUB_ENV"
          echo "FRONTEND_IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}-frontend" >> "$GITHUB_ENV"
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: SE320App
          file: SE320App/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}:latest
      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: SE320App/frontend
          file: SE320App/frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.FRONTEND_IMAGE }}:latest
      - name: Smoke test full stack
        working-directory: SE320App
        env:
          BACKEND_IMAGE: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          FRONTEND_IMAGE: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          docker pull "$BACKEND_IMAGE"
          docker pull "$FRONTEND_IMAGE"
          docker compose up -d --no-build
          for i in {1..30}; do
            curl -fsS http://localhost:8080/v3/api-docs && break
            sleep 5
          done
          curl -fsS http://localhost:8080/v3/api-docs
          curl -fsS http://localhost:3000/
      - name: Show container logs on failure
        if: failure()
        working-directory: SE320App
        run: docker compose logs
      - name: Stop smoke test stack
        if: always()
        working-directory: SE320App
        run: docker compose down -v
