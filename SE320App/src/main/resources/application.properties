# Application Configuration
spring.application.name=digital-therapy-assistant
server.port=8080

# Default datasource: H2 file database
spring.datasource.url=${H2_URL:jdbc:h2:file:./data/digitaltherapy_db;DB_CLOSE_DELAY=-1}
spring.datasource.username=${H2_USER:sa}
spring.datasource.password=${H2_PASSWORD:}
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# Common JPA settings
spring.jpa.open-in-view=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# SQL Init
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql

# CLI
app.cli.enabled=true

# JWT Configuration
jwt.secret=${JWT_SECRET:your-256-bit-secret-key-for-digital-therapy-app-replace-in-production}
jwt.expiration=3600000
jwt.refresh-expiration=86400000

# OpenAI Configuration
openai.api-key=${OPENAI_API_KEY:}
openai.base-url=https://api.openai.com/v1
openai.chat.model=gpt-3.5-turbo
spring.ai.vectorstore.simple.store.path=./data/vector-store.json

# OpenAPI/Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui

# Logging
logging.level.root=INFO
logging.level.com.SE320.therapy.service=INFO
logging.level.com.SE320.therapy.controller=INFO
