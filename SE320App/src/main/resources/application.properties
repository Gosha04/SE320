# Application Configuration
spring.application.name=digital-therapy-assistant
server.port=8080

# Default datasource profile: MySQL (kept for existing local setup)
spring.datasource.url=${MYSQL_URL}
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update

# Common JPA settings
spring.jpa.open-in-view=false

# SQL Init
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# CLI
app.cli.enabled=true

# MCP Server
spring.ai.mcp.server.enabled=${MCP_ENABLED:false}
spring.ai.mcp.server.stdio=${MCP_STDIO:false}
spring.ai.mcp.server.name=digital-therapy-assistant
spring.ai.mcp.server.version=${project.version:1.0.0}
spring.ai.mcp.server.type=SYNC
spring.ai.mcp.server.annotation-scanner.enabled=true
spring.ai.mcp.server.instructions=Digital Therapy Assistant MCP server exposing CBT sessions, thought diary, progress, crisis resources, and prompt templates.

# JWT Configuration
jwt.secret=${JWT_SECRET:your-256-bit-secret-key-for-digital-therapy-app-replace-in-production}
jwt.expiration=3600000
jwt.refresh-expiration=86400000

# OpenAI Configuration
openai.api-key=${OPENAI_API_KEY:}
openai.base-url=https://api.openai.com/v1
openai.chat.model=gpt-3.5-turbo
spring.ai.vectorstore.simple.store.path=./data/vector-store.json

# OpenAPI/Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui

# Logging
logging.level.root=INFO
logging.level.com.SE320.therapy.service=INFO
logging.level.com.SE320.therapy.controller=INFO
